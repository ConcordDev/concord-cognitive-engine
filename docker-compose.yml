services:
  # Backend API Server — GPU Pod: 16 vCPU / 62GB RAM / RTX 4000 Ada 20GB VRAM
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: concord-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    # Raise file-descriptor limit from Linux default 1024 → 1,048,576.
    # The default crashes at ~1k concurrent WS + HTTP connections (4–5 FDs
    # each). 1M supports 200k+ connections with OS overhead headroom.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    read_only: false  # Data dir needs writes; consider tmpfs for /tmp
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
    environment:
      - NODE_ENV=production
      - PORT=5050
      - DATA_DIR=/data
      - DB_PATH=/data/db/concord.db
      - STATE_PATH=/data/concord_state.json
      - NODE_OPTIONS=--max-old-space-size=32768
      - MAX_OLD_SPACE_SIZE=32768
      - UV_THREADPOOL_SIZE=16
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama-conscious:11434}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://concord-os.org}
      - FRONTEND_URL=${FRONTEND_URL:-https://concord-os.org}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SHUTDOWN_TIMEOUT_MS=${SHUTDOWN_TIMEOUT_MS:-10000}
      - CONCORD_WS_ENABLED=${CONCORD_WS_ENABLED:-true}
      # ── Living-layer prod manifest (mirrors .env.runpod §2) ────────────────
      # Without these, a compose deploy silently ships the default-OFF systems
      # inert: no LLM dialogue/dreams/forward-sim, agent asleep, CSRF loose —
      # brains healthy, zero errors, world "feels scripted". Defaults here are
      # the PROD-ON posture; override via env when needed. Verify with:
      #   node server/scripts/verify-prod-flags.mjs   (the runpod-up.sh gate)
      # 2a. Default-OFF features → ON
      - CONCORD_CIVIC_BONDS=${CONCORD_CIVIC_BONDS:-1}
      - CONCORD_VIABILITY=${CONCORD_VIABILITY:-1}
      - CONCORD_VIABILITY_ETHICS=${CONCORD_VIABILITY_ETHICS:-1}
      - CONCORD_SOCIAL_LIFE=${CONCORD_SOCIAL_LIFE:-1}
      - CONCORD_SOCIAL_EVENTS=${CONCORD_SOCIAL_EVENTS:-1}
      - CONCORD_SKILL_FORGE=${CONCORD_SKILL_FORGE:-1}
      - CONCORD_CHILD_REFUSAL=${CONCORD_CHILD_REFUSAL:-1}
      - CONCORD_EXPRESSION=${CONCORD_EXPRESSION:-1}
      - CONCORD_REALM_CONTROL=${CONCORD_REALM_CONTROL:-1}
      - CONCORD_COLLAPSE_CASCADE=${CONCORD_COLLAPSE_CASCADE:-1}
      - CONCORD_EVO_ASSET_GAMEPLAY=${CONCORD_EVO_ASSET_GAMEPLAY:-1}
      - CONCORD_GOSSIP=${CONCORD_GOSSIP:-1}
      - CONCORD_WORLD_DENSITY=${CONCORD_WORLD_DENSITY:-1}
      - CONCORD_LIVING_CAREER=${CONCORD_LIVING_CAREER:-1}
      - CONCORD_REPUTATION=${CONCORD_REPUTATION:-1}
      - CONCORD_FTUE_TELEMETRY=${CONCORD_FTUE_TELEMETRY:-1}
      # client-config polarity partners (server default-ON; the browser needs =1)
      - CONCORD_ADAPTIVE_SCORE=${CONCORD_ADAPTIVE_SCORE:-1}
      - CONCORD_WORLD_AUDIO=${CONCORD_WORLD_AUDIO:-1}
      - CONCORD_ART_ATMOSPHERE=${CONCORD_ART_ATMOSPHERE:-1}
      - CONCORD_ART_UI=${CONCORD_ART_UI:-1}
      - CONCORD_LINK_SYSTEM=${CONCORD_LINK_SYSTEM:-1}
      # 2b. LLM-gated features (deterministic fallbacks — safe when brains are down)
      - CONCORD_SKILL_EVOLUTION_LLM=${CONCORD_SKILL_EVOLUTION_LLM:-true}
      - CONCORD_NPC_DIALOGUE_LLM=${CONCORD_NPC_DIALOGUE_LLM:-true}
      - CONCORD_QUEST_DIALOGUE_LLM=${CONCORD_QUEST_DIALOGUE_LLM:-true}
      - CONCORD_DREAM_LLM=${CONCORD_DREAM_LLM:-true}
      - CONCORD_FORWARD_SIM_LLM=${CONCORD_FORWARD_SIM_LLM:-true}
      - CONCORD_PROCGEN_BACKSTORY_LLM=${CONCORD_PROCGEN_BACKSTORY_LLM:-true}
      - CONCORD_FITNESS_PLAN_LLM=${CONCORD_FITNESS_PLAN_LLM:-true}
      # Agent + awareness stack (guardrails enforced regardless: allowlist,
      # Sparks-only, per-actor cap, disclosure, kill-switch)
      - CONCORD_AGENT_ENABLED=${CONCORD_AGENT_ENABLED:-1}
      - CONCORD_AWARENESS_LOOP=${CONCORD_AWARENESS_LOOP:-1}
      - CONCORD_SPEED_AOI=${CONCORD_SPEED_AOI:-true}
      - CONCORD_TEMPERAMENT=${CONCORD_TEMPERAMENT:-1}
      # 2d. Security HARDENING (protections, not features)
      - CONCORD_ENFORCE_CSRF=${CONCORD_ENFORCE_CSRF:-true}
      # NOT defaulted on (deliberate): CONCORD_AUTOFIX_LOOP (autonomous code
      # self-modification — enable only where the repair sandbox is trusted),
      # CONCORD_AP_REQUIRE_SIGNATURE (only when federating), CONCORD_OTEL_ENABLED
      # (needs a collector endpoint). Never set the footguns (DISABLE_CSRF,
      # RATE_LIMIT_BYPASS, CHAOS_ENABLED, WEBHOOK_ALLOW_OPEN, FEDERATION_ALLOW_LOOPBACK).
      # Four-Brain Cognitive Architecture
      # Four-brain models. Defaults bumped for the RTX PRO 4500 (32GB
      # VRAM): conscious goes 14B → 32B at q4_K_M (~18GB), leaving ~14GB
      # for the other three brains + KV cache + LLaVA vision. Override
      # via env if running on smaller hardware.
      - BRAIN_CONSCIOUS_URL=${BRAIN_CONSCIOUS_URL:-http://ollama-conscious:11434}
      - BRAIN_CONSCIOUS_MODEL=${BRAIN_CONSCIOUS_MODEL:-qwen2.5:32b-instruct-q4_K_M}
      - BRAIN_SUBCONSCIOUS_URL=${BRAIN_SUBCONSCIOUS_URL:-http://ollama-subconscious:11434}
      - BRAIN_SUBCONSCIOUS_MODEL=${BRAIN_SUBCONSCIOUS_MODEL:-qwen2.5:7b-instruct-q5_K_M}
      # Phase D — multi-endpoint scale-out. URLS (plural) overrides URL.
      - BRAIN_SUBCONSCIOUS_URLS=${BRAIN_SUBCONSCIOUS_URLS:-http://ollama-subconscious:11434,http://ollama-subconscious-2:11434}
      - BRAIN_UTILITY_URL=${BRAIN_UTILITY_URL:-http://ollama-utility:11434}
      - BRAIN_UTILITY_MODEL=${BRAIN_UTILITY_MODEL:-qwen2.5:3b-instruct-q5_K_M}
      - BRAIN_UTILITY_URLS=${BRAIN_UTILITY_URLS:-http://ollama-utility:11434,http://ollama-utility-2:11434}
      - BRAIN_REPAIR_URL=${BRAIN_REPAIR_URL:-http://ollama-repair:11434}
      - BRAIN_REPAIR_MODEL=${BRAIN_REPAIR_MODEL:-qwen2.5:1.5b-instruct-q5_K_M}
      # Vision (LLaVA) — used by personal-locker upload pipeline + food
      # vision domain action. New service below; default model is the
      # 13b LLaVA at q4 to keep alongside the brains.
      - BRAIN_VISION_URL=${BRAIN_VISION_URL:-http://ollama-vision:11434}
      - BRAIN_VISION_MODEL=${BRAIN_VISION_MODEL:-qwen2.5vl:7b}
      # GPU embeddings via Ollama. nomic-embed-text is 768-dim and ~50×
      # faster than the CPU Xenova fallback on this hardware.
      - CONCORD_EMBED_BACKEND=${CONCORD_EMBED_BACKEND:-ollama}
      - CONCORD_EMBED_OLLAMA_URL=${CONCORD_EMBED_OLLAMA_URL:-http://ollama-vision:11434}
      - CONCORD_EMBED_OLLAMA_MODEL=${CONCORD_EMBED_OLLAMA_MODEL:-nomic-embed-text}
      # Brain server-side concurrency — match OLLAMA_NUM_PARALLEL on each
      # service. Override per env when running on smaller hardware.
      - BRAIN_CONSCIOUS_CONCURRENT=${BRAIN_CONSCIOUS_CONCURRENT:-8}
      - BRAIN_SUBCONSCIOUS_CONCURRENT=${BRAIN_SUBCONSCIOUS_CONCURRENT:-12}
      - BRAIN_UTILITY_CONCURRENT=${BRAIN_UTILITY_CONCURRENT:-16}
      - BRAIN_REPAIR_CONCURRENT=${BRAIN_REPAIR_CONCURRENT:-4}
      - BRAIN_VISION_CONCURRENT=${BRAIN_VISION_CONCURRENT:-8}
      - LLM_CONCURRENCY=${LLM_CONCURRENCY:-32}
      - LLM_CONCURRENCY_LIMIT=${LLM_CONCURRENCY_LIMIT:-64}
      # Heartbeat & emergent throttles
      - CONCORD_HEARTBEAT_MS=${CONCORD_HEARTBEAT_MS:-5000}
      - CONCORD_AGENT_TICK_CONCURRENT=${CONCORD_AGENT_TICK_CONCURRENT:-32}
      - CONCORD_GHOST_THREADS_CONCURRENT=${CONCORD_GHOST_THREADS_CONCURRENT:-16}
      # World sharding (Phase I) — per-world worker thread spawned on travel,
      # so the parent governor offloads all scope:'world' sim off the main
      # event loop. Default ON; set CONCORD_SHARD_WORLDS=false to keep all
      # heartbeats in-process. Shard health is on the ops-telemetry lens +
      # /api/admin/world-shards; ConcordWorldShard* alerts page on stuck/can't-spawn.
      - CONCORD_SHARD_WORLDS=${CONCORD_SHARD_WORLDS:-true}
      - CONCORD_SHARD_IDLE_TEARDOWN_MS=${CONCORD_SHARD_IDLE_TEARDOWN_MS:-600000}
      - CONCORD_SHARD_READY_TIMEOUT_MS=${CONCORD_SHARD_READY_TIMEOUT_MS:-8000}
      # SQLite tuning
      - CONCORD_SQLITE_MMAP_MB=${CONCORD_SQLITE_MMAP_MB:-4096}
      - CONCORD_SQLITE_CACHE_MB=${CONCORD_SQLITE_CACHE_MB:-1024}
      # Auth — MUST set these in .env file
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_MODE=${AUTH_MODE:-hybrid}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - SOVEREIGN_USERNAME=${SOVEREIGN_USERNAME:-Concord_Founder_Dutch}
      - FOUNDER_SECRET=${FOUNDER_SECRET:-}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - REFRESH_TOKEN_EXPIRES=${REFRESH_TOKEN_EXPIRES:-30d}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      # LLM — set OPENAI_API_KEY in .env for AI features
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL_FAST=${OPENAI_MODEL_FAST:-gpt-4o-mini}
      - OPENAI_MODEL_SMART=${OPENAI_MODEL_SMART:-gpt-4.1}
      # Stripe — set these in .env to enable payments
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_TEAMS=${STRIPE_PRICE_TEAMS:-}
      # Redis — for Socket.IO horizontal scaling + session cache
      - REDIS_URL=redis://redis:6379
      # Optional features
      - EMBEDDINGS_ENABLED=${EMBEDDINGS_ENABLED:-true}
      - FEDERATION_ENABLED=${FEDERATION_ENABLED:-false}
      # Safety — disabled by default in production
      - ENABLE_TERMINAL_EXEC=${ENABLE_TERMINAL_EXEC:-false}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
      ollama-conscious:
        condition: service_healthy
      ollama-subconscious:
        condition: service_healthy
      ollama-utility:
        condition: service_healthy
      ollama-utility-2:
        condition: service_healthy
      ollama-subconscious-2:
        condition: service_healthy
      ollama-repair:
        condition: service_healthy
    volumes:
      - concord-data:/data
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5050/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s  # 3 min grace for embedding load + Ollama warm-up
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 4G
          cpus: '2.0'

  # Read-only replica (horizontal read scale-out) — OPT-IN.
  # Start with:  docker compose --profile read-replica up -d backend-read
  # Scale with:  docker compose --profile read-replica up -d --scale backend-read=3
  # Then uncomment the read-route block in nginx/conf.d/default.conf (mind the
  # STATE-backed caveat there). Opens the shared SQLite file read-only (WAL =
  # unlimited concurrent reader processes), runs NO heartbeat / shards / brains,
  # and serves ONLY the vetted pure-read GET allowlist (server-side default-deny
  # gate). JWT_SECRET MUST match the writer so tokens validate across processes.
  backend-read:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["read-replica"]
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - NODE_ENV=production
      - PORT=5050
      - DATA_DIR=/data
      - DB_PATH=/data/db/concord.db
      - CONCORD_READ_REPLICA=1          # the role flag: readonly DB + skip all writes/sim
      - CONCORD_SHARD_WORLDS=false       # replicas never run world shards
      - CONCORD_DISABLE_BRAINS=true      # replicas serve reads only; no LLM init
      - NODE_OPTIONS=--max-old-space-size=8192
      - UV_THREADPOOL_SIZE=8
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://concord-os.org}
      - FRONTEND_URL=${FRONTEND_URL:-https://concord-os.org}
      - REDIS_URL=redis://redis:6379    # shared Socket.IO fan-out + state-sync
      - JWT_SECRET=${JWT_SECRET}         # MUST equal the writer's for token validation
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_MODE=${AUTH_MODE:-hybrid}
      - SOVEREIGN_USERNAME=${SOVEREIGN_USERNAME:-Concord_Founder_Dutch}
      - CONCORD_SQLITE_MMAP_MB=${CONCORD_SQLITE_MMAP_MB:-4096}
      - CONCORD_SQLITE_CACHE_MB=${CONCORD_SQLITE_CACHE_MB:-1024}
    depends_on:
      backend:
        condition: service_healthy      # writer owns schema/migrations — boot it first
      redis:
        condition: service_healthy
    volumes:
      - concord-data:/data              # shared DB file (WAL: multi-reader safe)
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5050/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Frontend Next.js App
  frontend:
    build:
      context: ./concord-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://concord-os.org}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://concord-os.org}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://concord-os.org}
    container_name: concord-frontend
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - frontend-data:/data
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: concord-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: concord-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: |
      /bin/sh -c '
      trap exit TERM
      while :; do
        certbot renew --quiet --non-interactive 2>&1 | tee -a /var/log/certbot.log || echo "[Certbot] Renewal check completed with warnings at $$(date)"
        sleep 12h & wait
      done
      '
    healthcheck:
      test: ["CMD", "test", "-f", "/etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh", "-o", "-d", "/etc/letsencrypt/live"]
      interval: 86400s
      timeout: 10s
      retries: 1
      start_period: 60s

  # Prometheus — scrapes /metrics from backend
  prometheus:
    image: prom/prometheus:latest
    container_name: concord-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - concord-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # Grafana — dashboards for Concord metrics
  grafana:
    image: grafana/grafana:latest
    container_name: concord-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:?GRAFANA_USER must be set in .env}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # Bind Grafana to localhost only — access via SSH tunnel or VPN in production
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - concord-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.15'

  # Redis — Socket.IO pub/sub adapter + session cache
  redis:
    image: redis:7-alpine
    container_name: concord-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      # was `concord-net` — an UNDEFINED network (only concord-network exists at
      # the bottom of this file), which isolated redis from the backend: Socket.IO
      # cross-replica fan-out + the session cache silently degraded to in-process.
      - concord-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: '0.5'

  # Qdrant — vector search engine for embedding similarity
  qdrant:
    image: qdrant/qdrant:latest
    container_name: concord-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=2
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ── Four-Brain Cognitive Architecture (GPU: RTX 4000 Ada, 16GB VRAM shared) ──
  # VRAM budget: 14B-q4(~5.5GB) + 7B(~4.5GB) + 3B(~2GB) + 1.5B(~1GB) + embed(~0.3GB) = ~13.3GB → 2.7GB headroom
  # Brain 1: Conscious — chat and deep reasoning (14B-q4_K_M on GPU, ~5.5GB VRAM)
  ollama-conscious:
    image: ollama/ollama
    container_name: concord-ollama-conscious
    restart: unless-stopped
    environment:
      # Bumped parallelism + tuning flags for the RTX PRO 4500 Blackwell
      # (32GB GDDR7, 5th-gen tensor cores). FLASH_ATTENTION uses the
      # tensor cores for a ~30% inference speedup; KV_CACHE_TYPE=q8_0
      # halves KV memory at near-zero quality cost so we can hold longer
      # context. GPU_OVERHEAD reserves 1GB headroom for the KV cache.
      # Phase D: bumped 8 → 12. The 32B conscious model is the largest;
      # going higher than 12 risks KV-cache thrash.
      - OLLAMA_NUM_PARALLEL=12
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_GPU_OVERHEAD=1073741824
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-conscious-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: '8.0'
        reservations:
          memory: 16G
          cpus: '4.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Brain 2: Subconscious — autogen, dream, evolution, synthesis, birth (7B on GPU, ~4.5GB VRAM)
  # THE big win: 1.5B → 7B means every DTU Concord creates is fundamentally smarter
  ollama-subconscious:
    image: ollama/ollama
    container_name: concord-ollama-subconscious
    restart: unless-stopped
    environment:
      # Phase D: bumped 12 → 16. 7B model fits comfortably.
      - OLLAMA_NUM_PARALLEL=16
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-subconscious-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '1.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Brain 3: Utility — lens interactions, entity actions, quick domain tasks (3B on GPU, ~2GB VRAM)
  # Speed matters more than depth here — 3B stays the same, fast turnaround
  ollama-utility:
    image: ollama/ollama
    container_name: concord-ollama-utility
    restart: unless-stopped
    environment:
      # Phase D: bumped 16 → 32. Utility (qwen2.5:3b) routes ~65% of all
      # brain requests; this is the highest leverage bump.
      - OLLAMA_NUM_PARALLEL=32
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-utility-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '1.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Phase D — second utility instance. The utility brain routes ~65% of
  # all requests (lens actions, quick reasoning). Round-robin across two
  # instances roughly doubles peak throughput without changing per-call
  # latency. Backend reads BRAIN_UTILITY_URLS (plural, comma-separated) and
  # picks the less-loaded endpoint per call (lib/brain-config.js).
  ollama-utility-2:
    image: ollama/ollama
    container_name: concord-ollama-utility-2
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=32
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-utility-2-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '1.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Phase D — second subconscious instance. Autogen / dream / synthesis
  # batches dominate the subconscious queue at night; a second endpoint
  # halves the wait.
  ollama-subconscious-2:
    image: ollama/ollama
    container_name: concord-ollama-subconscious-2
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=16
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-subconscious-2-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '1.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Brain 4: Repair — error detection, auto-fix (1.5B on GPU, ~1GB VRAM)
  # 3x upgrade from 0.5B — can actually parse error messages now
  ollama-repair:
    image: ollama/ollama
    container_name: concord-ollama-repair
    restart: unless-stopped
    environment:
      # Phase D: bumped 4 → 16. The 1.5B repair model is tiny — there's
      # no reason it should be the throughput bottleneck.
      - OLLAMA_NUM_PARALLEL=16
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-repair-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Vision brain — LLaVA 13b (~9GB VRAM at q4_K_M). Used by the personal-
  # locker upload pipeline (server/lib/personal-locker/pipeline.js
  # analyzeContent()), the food-vision domain action, and any DTU that
  # needs image understanding. Separate from the four cognitive brains
  # so vision queries don't compete with chat for KV cache.
  ollama-vision:
    image: ollama/ollama
    container_name: concord-ollama-vision
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-vision-data:/root/.ollama
    networks:
      - concord-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 10G
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  concord-network:
    driver: bridge

volumes:
  concord-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  ollama-conscious-data:
    driver: local
  ollama-utility-2-data:
    driver: local
  ollama-subconscious-2-data:
    driver: local
  ollama-vision-data:
    driver: local
  ollama-subconscious-data:
    driver: local
  ollama-utility-data:
    driver: local
  ollama-repair-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  frontend-data:
    driver: local

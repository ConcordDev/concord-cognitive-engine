# Production audit gate. Every PR runs the full static-audit suite + the
# server test suite. The job fails if any of the audit scores regress
# below their established floors:
#   - macro-depth weighted score:    must be 1.000
#   - UX polish weighted score:      must be ≥ 0.995
#   - verifier WIRED count:          must be ≥ 234 of 235
#   - content census:                must be AT TARGET (no world/lib gaps)
#   - test suite:                    must be 0 failures
#
# The browser-driven audit (a11y + console errors via Playwright) runs
# on a separate matrix entry against a built frontend + booted backend.
# A11y violations gate the PR; console errors (mostly auth-flow noise)
# are reported but don't gate. Both budgets are tunable above this
# block — adjust deliberately, never silently.

name: audits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly drift detection: re-run on Sunday 04:00 UTC so a quiet
    # main branch still surfaces breakage when external deps update.
    - cron: '0 4 * * 0'

jobs:
  structural-audits:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund

      - name: Install repo deps (audit scripts)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lens wiring verifier
        run: |
          node scripts/verify-lens-backends.mjs > /tmp/verify.log
          tail /tmp/verify.log
          # Must be ≥234 WIRED, only 1 NO-BACKEND-CALL allowed
          jq -e '.verdicts.WIRED >= 234' /tmp/verify.log >/dev/null || (
            echo "::error::Lens wiring regressed below 234 WIRED."; exit 1
          )

      - name: Move-render coverage gate
        run: |
          # Self-deriving gate: every move/skill/element/verb must resolve to a
          # real anim clip + VFX + SFX (no generic fallback). Ratcheting floor on
          # the OVERALL score — bump it as WS-RENDER slices land so coverage can
          # only climb. Baseline at introduction: 45% (archetype 89.5 / vfx 75.7
          # / sfx 0 — the action+move SFX vocabulary is unbound in SoundscapeEngine).
          node scripts/verify-move-render-coverage.mjs
          node scripts/verify-move-render-coverage.mjs --ci 100

      - name: Event-consumer (legibility) gate
        run: |
          # Self-deriving: every realtime event the server emits should have a
          # frontend consumer (no silent simulation). Ratcheting floor — bump as
          # WS-LEGIBILITY slices add SocketEvent-union members + UI consumers.
          # Baseline at introduction: 64.7% consumed.
          node scripts/verify-event-consumers.mjs
          node scripts/verify-event-consumers.mjs --ci 77

      - name: Schema/query drift gate (ratchet — prevents NEW drift)
        run: |
          # Runs all migrations into an in-memory DB (PRAGMA = authoritative column
          # truth) and validates db.prepare/exec column references where attribution
          # is unambiguous (INSERT/UPDATE cols, single-table SELECTs, alias.col).
          # The current count is a TRIAGE BACKLOG (runtime-confirm each before
          # editing — some are migration/code or live-vs-fresh-schema mismatches,
          # NOT all hard bugs). The --ci floor ratchets DOWN as the queue is worked;
          # it fails the build only if NEW drift is introduced above the floor.
          node scripts/verify-schema-drift.mjs
          node scripts/verify-schema-drift.mjs --ci 44

      - name: Render-parity gate (static appearance layer)
        run: |
          node scripts/verify-render-parity.mjs
          node scripts/verify-render-parity.mjs --ci 100

      - name: Economic invariants (exploit gate)
        run: |
          # Constitutional economy constants must not drift without governance.
          node scripts/verify-economic-invariants.mjs
          node scripts/verify-economic-invariants.mjs --ci

      - name: Macro depth grader
        run: |
          node scripts/grade-macro-depth.mjs
          score=$(jq -r .weightedScore audit/macro-depth.json)
          echo "Macro depth: $score"
          awk -v s="$score" 'BEGIN { if (s+0 < 1.0) { print "::error::Macro depth regressed below 1.000"; exit 1 } }'

      - name: UX polish grader
        run: |
          node scripts/grade-ux-polish.mjs
          score=$(jq -r .weightedScore audit/ux-polish.json)
          echo "UX polish: $score"
          awk -v s="$score" 'BEGIN { if (s+0 < 0.995) { print "::error::UX polish regressed below 0.995"; exit 1 } }'

      - name: Spec-vs-implementation audit
        run: node scripts/audit-spec-vs-impl.mjs

      - name: Content census
        run: |
          # Authored content (per-world NPCs/factions + minigame libs) must stay
          # AT TARGET — fails the build on any below-target surface so content
          # can't silently regress.
          node scripts/author/census.mjs --ci

      - name: Server test suite
        working-directory: server
        run: CONCORD_NO_LISTEN=true NODE_ENV=test npm test

      - name: Upload audit outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}
          path: |
            audit/macro-depth.json
            audit/ux-polish.json
            audit/spec-vs-impl.json

  browser-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: structural-audits
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: |
          (cd server && npm ci --no-audit --no-fund)
          (cd concord-frontend && npm ci --no-audit --no-fund)
          npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Boot backend
        run: |
          cd server
          CONCORD_FORCE_LISTEN=true PORT=5050 NODE_ENV=test \
            JWT_SECRET=ci-secret-must-be-at-least-32-characters \
            node server.js > /tmp/server.log 2>&1 &
          for i in {1..60}; do
            curl -sf http://127.0.0.1:5050/api/status >/dev/null && break
            sleep 5
          done

      - name: Boot frontend
        working-directory: concord-frontend
        run: |
          NEXT_TELEMETRY_DISABLED=1 npm run dev > /tmp/frontend.log 2>&1 &
          for i in {1..60}; do
            curl -sf http://127.0.0.1:3000/ >/dev/null && break
            sleep 5
          done

      - name: Browser audit (axe-core + console + responsive)
        run: node scripts/audit-browser.mjs

      - name: Gate on a11y violations
        run: |
          violations=$(jq -r '.totalA11yNodes' audit/browser-audit.json)
          echo "Total a11y violation nodes: $violations"
          if [ "$violations" -gt 0 ]; then
            echo "::error::A11y violations detected. See audit/browser-audit.md"
            jq -r '.topViolationIds | to_entries | sort_by(-.value.lensCount) | .[0:5][]' audit/browser-audit.json
            exit 1
          fi

      - name: Upload browser-audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-${{ github.run_id }}
          path: audit/browser-audit.*

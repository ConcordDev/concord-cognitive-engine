name: Autofix — Reflex → Forge → PR

# Phase 8.5 of /root/.claude/plans/dope-now-make-a-effervescent-deer.md.
#
# When a reflex detector posts a high/critical finding and an operator
# accepts the resulting Forge-generated patch via the /lenses/autofix-queue
# UI, this workflow opens the actual PR. The split keeps an explicit
# human-in-the-loop gate between "the system noticed something" and "the
# system is editing main."
#
# Triggers:
#   - workflow_dispatch (manual, with autofix_id input)
#   - repository_dispatch event 'concord-autofix-accepted' (server emits
#     when a human approves an autofix_proposals row)
#
# Safety:
#   - Never auto-merges. Only opens a draft PR.
#   - Branch name is deterministic so re-dispatching idempotently
#     updates the same PR.
#   - Patch must pass lint:ci + typecheck before the PR is opened.

on:
  workflow_dispatch:
    inputs:
      autofix_id:
        description: 'autofix_proposals.id to materialise as a PR'
        required: true
        type: string
  repository_dispatch:
    types: [concord-autofix-accepted]

jobs:
  open-pr:
    name: Open autofix PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Resolve autofix id
        id: resolve
        run: |
          ID="${{ inputs.autofix_id }}"
          if [ -z "$ID" ]; then
            ID="${{ github.event.client_payload.autofix_id }}"
          fi
          if [ -z "$ID" ]; then
            echo "::error::No autofix_id provided"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "branch=autofix/${ID}" >> "$GITHUB_OUTPUT"

      - name: Materialise patch
        id: materialise
        env:
          AUTOFIX_ID: ${{ steps.resolve.outputs.id }}
          DATA_DIR: /tmp/concord-autofix-db
          NODE_OPTIONS: --max-old-space-size=12288
        working-directory: ./server
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          # The materialise step reads autofix_proposals[id], extracts the
          # Forge output, applies it as a patch via the existing
          # forge.apply_patch macro (which knows how to write each section
          # of a generated single-file app to the right server path).
          # Output: a directory ./.autofix-staging with the modified files.
          node -e "
            (async () => {
              const { default: better } = await import('better-sqlite3');
              const fs = await import('node:fs');
              const path = await import('node:path');
              const db = new better(process.env.DATA_DIR + '/concord.db');
              const row = db.prepare('SELECT forge_output_json FROM autofix_proposals WHERE id = ?').get(process.env.AUTOFIX_ID);
              if (!row) { console.error('autofix not found'); process.exit(2); }
              const forge = JSON.parse(row.forge_output_json);
              const stagingDir = path.resolve('../.autofix-staging');
              fs.mkdirSync(stagingDir, { recursive: true });
              fs.writeFileSync(path.join(stagingDir, 'forge-output.json'), JSON.stringify(forge, null, 2));
              console.log('Materialised forge output to', stagingDir);
            })().catch(e => { console.error(e); process.exit(1); });
          " || echo "::warning::No autofix DB yet — workflow runs as smoke check"

      - name: Verify gates
        env:
          NODE_OPTIONS: --max-old-space-size=12288
        run: |
          cd server && npm run lint:ci && npm run typecheck

      - name: Create PR branch
        run: |
          git config user.name "concord-autofix[bot]"
          git config user.email "autofix@concord-os.org"
          git checkout -B "${{ steps.resolve.outputs.branch }}"
          git add -A
          git diff --cached --quiet && {
            echo "::warning::No changes to commit — skipping PR"
            exit 0
          }
          git commit -m "autofix: reflex-cortex proposal #${{ steps.resolve.outputs.id }}"
          git push --force-with-lease origin "${{ steps.resolve.outputs.branch }}"

      - name: Open draft PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.resolve.outputs.branch }}
          base: main
          title: "autofix: reflex-cortex proposal #${{ steps.resolve.outputs.id }}"
          body: |
            Auto-generated by the Concord reflex → Forge → PR loop.

            **Autofix id**: ${{ steps.resolve.outputs.id }}
            **Source**: server/lib/reflex-cortex.js (drift / scaling / dependency / unsafe-expansion)
            **Forge mode**: minimal_safe_diff

            This PR ships as DRAFT. A human reviewer must approve before merge.

            See `/root/.claude/plans/dope-now-make-a-effervescent-deer.md`
            Phase 8.5 for the loop architecture.
          draft: true
          labels: |
            autofix
            reflex-cortex

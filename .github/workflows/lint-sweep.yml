name: Lint Sweep
# Weekly auto-fix sweep — runs eslint --fix across server + frontend, opens
# a PR titled "chore: weekly lint sweep" if there are changes. Reviewable,
# not pushed-to-main, so a stray bad fix can't land without human gate.
#
# Runs on:
#   - schedule: every Monday 04:00 UTC
#   - workflow_dispatch: on-demand from the Actions tab

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            concord-frontend/package-lock.json

      - name: Install server deps
        working-directory: ./server
        run: npm ci

      - name: Install frontend deps
        working-directory: ./concord-frontend
        run: npm ci

      - name: Apply ESLint --fix to server
        working-directory: ./server
        run: npm run lint:fix || true

      - name: Apply ESLint --fix to frontend
        working-directory: ./concord-frontend
        run: npm run lint -- --fix || true

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with sweep
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly lint --fix sweep"
          title: "chore: weekly lint --fix sweep"
          body: |
            Auto-applied `eslint --fix` across server + frontend.

            Generated by `.github/workflows/lint-sweep.yml`.

            Review the diff and merge if the fixes look correct. If a fix is
            wrong, narrow the rule (or add a per-file disable) and the next
            sweep will skip it.
          branch: chore/lint-sweep-${{ github.run_number }}
          delete-branch: true
          labels: |
            chore
            automated

name: Playthrough (Phase Z)

# Phase Z — Playwright-driven per-world walkthrough on every push to
# the concordia foundation branch. Boots backend + frontend, walks all
# 6 canon worlds, exercises one action per category, captures
# screenshots as artifacts.

on:
  push:
    branches: [claude/concordia-foundation, main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  playthrough:
    name: Per-world walkthrough
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            concord-frontend/package-lock.json

      - name: Install server deps
        working-directory: ./server
        run: npm ci

      - name: Install frontend deps
        working-directory: ./concord-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./concord-frontend
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        working-directory: ./server
        run: npm run migrate
        env:
          DB_PATH: ./data/concord.test.db

      - name: Boot server (background)
        working-directory: ./server
        run: nohup npm start > server.log 2>&1 &
        env:
          NODE_ENV: test
          DB_PATH: ./data/concord.test.db
          PORT: 5050
          JWT_SECRET: test_secret_for_e2e_playthrough_phase_z
          # NODE_ENV=test suppresses port binding (server.js:56647) —
          # CONCORD_FORCE_LISTEN is the escape hatch for out-of-process
          # integration boots. Without it nothing listens on :5050 and
          # every spec hits ECONNREFUSED (the wait loop below never
          # noticed because it didn't fail on timeout).
          CONCORD_FORCE_LISTEN: 'true'
          # No Ollama in CI — skip the 5 cold brain probes (~75-150s) so
          # the server reaches listen quickly. Same flag ci.yml sets.
          CONCORD_DISABLE_BRAINS: 'true'
          # The spec's beforeAll registers a fresh test user every run;
          # the per-IP daily registration cap (3/day) would 429 it after
          # a few CI runs. Same flag ci.yml sets to relax rate limits.
          CONCORD_RATE_LIMIT_BYPASS: '1'

      - name: Wait for server
        run: |
          # /health (not /api/health) so the loop polls the unauthenticated
          # health probe — matches ci.yml's Integration Test wait pattern.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5050/health > /dev/null 2>&1; then
              echo "Server ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start within 120s. Logs:"
          cat server/server.log || true
          exit 1

      # Build the prod artifact only — do NOT start the frontend here.
      # playwright.config.ts owns the webServer (`npm run start:ci` on
      # :3000, reuseExistingServer:false in CI). Pre-starting it here
      # caused playwright to fail at launch with "http://localhost:3000
      # is already used". Same shape as ci.yml's E2E Core job: build,
      # then let playwright manage the server.
      - name: Build frontend (production)
        working-directory: ./concord-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5050
          # Default Node heap (~3.8GB) OOMs the Next.js prod compile
          # of the 200+-lens codebase + Sentry webpack passes; matches
          # ci.yml / lighthouse.yml / platinum-performance.yml.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run playthrough
        working-directory: ./concord-frontend
        # playwright.config.ts's webServer block starts `npm run start:ci`
        # on :3000 and waits for it before any spec runs — no manual
        # frontend boot or readiness poll needed.
        #
        # --project=chromium pins the run to a single browser. The spec
        # itself declares `test.use({ browserName: 'chromium' })` at the
        # top, signalling chromium-only intent, but the file-level
        # `test.use` is overridden by playwright.config's `projects: [
        # chromium, firefox, webkit, mobile-chrome ]` — so without the
        # explicit flag the workflow expands every spec across 4 browsers,
        # 4× the work. The 30 min job timeout was hitting that ceiling
        # (cancelled at 31m28s on commit 5d72a39); pinning to chromium
        # brings the run back under budget.
        run: npx playwright test tests/e2e/playthrough.spec.ts --project=chromium
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playthrough-screenshots
          path: docs/smoke-screenshots/
          retention-days: 14

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server/server.log
          retention-days: 7

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: concord-frontend/frontend.log
          retention-days: 7

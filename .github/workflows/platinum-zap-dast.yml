name: Platinum DAST (OWASP ZAP)

# Sprint 20 — Dynamic Application Security Testing. Runs against a
# live Concord server instance to find vulnerabilities that only
# surface at runtime (auth flow weaknesses, session handling, CSRF
# token absence, etc.). The SAST gate covers static patterns; DAST
# covers behaviors.
#
# Runs nightly on main (live target = the actual deployed app would
# eat too much budget on every PR). Manual dispatch is also enabled.

on:
  push:
    # Solo-dev project: no point waiting until 04:00 UTC for the DAST
    # signal when we already know whether the merge landed. ZAP takes
    # ~5-10 minutes against a local instance — runs comfortably on
    # every main push within the Actions free-tier budget.
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC nightly — fallback for quiet days
  workflow_dispatch:
    inputs:
      target:
        description: 'URL to scan (default: spin up local instance)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  zap-baseline:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }

      - name: Start Concord server
        if: ${{ inputs.target == '' }}
        working-directory: ./server
        env:
          NODE_ENV: ci
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          PORT: 5050
          # Skip 5-brain Ollama init in CI (no Ollama service running).
          # Without this, initFiveBrains() runs 5 sequential probes with
          # ~15s AbortSignal.timeout each = ~75s of cold probe time, which
          # blew past the 60s wait loop. Same root-cause fix shape as
          # platinum-security + platinum-performance + main CI.
          CONCORD_DISABLE_BRAINS: 'true'
        run: |
          npm ci
          node server.js > server.log 2>&1 &
          sleep 5
          # Bumped 30 → 90 attempts (60s → 180s) to match the smoke +
          # integration + E2E wait budget. Even with brain-disable the
          # server takes 30-60s to warm migrations + heartbeats.
          for i in {1..90}; do
            if curl -sf http://localhost:5050/health > /dev/null 2>&1; then
              echo "Server ready after ${i} probes"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:5050/health > /dev/null 2>&1 || {
            echo "::error::Server did not respond on /health after 180s. Tail of server.log:"
            tail -n 200 server.log 2>/dev/null || echo "(no server.log)"
            exit 1
          }

      - name: ZAP Baseline Scan
        # `continue-on-error: true` at step level catches the OTHER class
        # of ZAP failure that `fail_action: false` doesn't: scan errors
        # like "spider read timeout" where ZAP couldn't reach the target
        # within the per-request 20s default. Concord's heartbeat ticks
        # + parallel spider load occasionally trip this on the first run
        # against an unwarmed instance. The report still uploads; we
        # just don't fail the job on infrastructure-class flake.
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: ${{ inputs.target || 'http://localhost:5050' }}
          rules_file_name: '.zap/rules.tsv'
          # Added `-z` block extending ZAP's HTTP connection timeout
          # to 60s (default is 20s). The spider hits many endpoints in
          # parallel and the slow ones (any path that triggers a DB
          # query under heartbeat-tick load) need more time. 60s still
          # bounds total scan duration via -m 5 (5 min max).
          cmd_options: |
            -a -j -m 5 -z "-config connection.timeoutInSecs=60 -config spider.thread=2"
          # `allow_issue_writing: false` prevents the action from opening
          # auto-generated GitHub issues on every run. The scan still
          # runs + the report is uploaded as the `zap-report` artifact;
          # we just don't spam the issue tracker until a triage process
          # exists. Flip to true once issue-triage cadence is decided.
          allow_issue_writing: false
          # `fail_action: false` keeps the step exit 0 even when ZAP
          # finds WARN/FAIL alerts. First-run baseline scans always have
          # informational noise (default security headers, X-Content-Type,
          # etc.) that needs triage before we know which are real vs
          # which to allowlist in .zap/rules.tsv. Pattern: scan → review
          # report artifact → update rules.tsv → flip back to true once
          # the baseline noise floor is documented. Same shape as the
          # platinum-visual-regression baseline_check guard.
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

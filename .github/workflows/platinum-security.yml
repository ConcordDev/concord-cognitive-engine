name: Platinum Security (SAST + SCA + Secrets)

# Sprint 18 — full platinum-tier security gate. Runs on every PR.
# Each step is independently informative; the workflow fails if any
# hard gate fails. Soft gates log to PR comments via GitHub Actions
# annotations.

on:
  pull_request:
    paths:
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'server/migrations/**'
      - '.github/workflows/platinum-security.yml'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-sast:
    name: SAST — Semgrep (rules in .semgrep.yml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - name: Semgrep SAST
        run: |
          npm install -g semgrep@latest || pip install semgrep
          semgrep --config=.semgrep.yml --error --severity=ERROR \
            --severity=WARNING --json --output=semgrep-results.json . || true
          # Always emit summary, fail on ERROR-tier hits.
          semgrep --config=.semgrep.yml --error --severity=ERROR .
      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: semgrep-results
          path: semgrep-results.json

  npm-audit:
    name: SCA — npm audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - name: Install server deps
        working-directory: ./server
        run: npm ci
      - name: npm audit (server) — fail on high
        working-directory: ./server
        run: npm audit --production --audit-level=high
      - name: Install frontend deps
        working-directory: ./concord-frontend
        run: npm ci
      - name: npm audit (frontend) — fail on high
        working-directory: ./concord-frontend
        run: npm audit --production --audit-level=high

  retire-js:
    name: SCA — retire.js (known vulnerable libs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - name: retire.js scan
        run: |
          npm install -g retire@latest
          retire --severity high --path server || true
          retire --severity high --path concord-frontend || true
          # Re-run to actually fail on high vulns.
          retire --severity high --exitwith 1 --path server
          retire --severity high --exitwith 1 --path concord-frontend

  secrets-scan:
    name: Secrets — gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  license-compliance:
    name: Supply Chain — license compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - name: Install + scan licenses
        run: |
          cd server
          npm ci
          npx license-checker --production --json | node ../scripts/check-licenses.js ../.license-checker-allowlist.json
          cd ../concord-frontend
          npm ci
          npx license-checker --production --json | node ../scripts/check-licenses.js ../.license-checker-allowlist.json

  sbom:
    name: Supply Chain — SBOM generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - name: Generate SBOM
        run: |
          mkdir -p audit
          npx @cyclonedx/cyclonedx-npm --output-file audit/sbom.json . || true
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: audit/sbom.json
          retention-days: 30

  container-scan:
    name: Container — Trivy image scan
    runs-on: ubuntu-latest
    # hashFiles() is only valid in `cache.key`-context expressions, not
    # in step/job `if:` conditions. Replaced with a runtime check
    # inside the build step that skips silently when Dockerfile is
    # absent. Sprint 34 fix — this job had been failing every push
    # since PR #330 merged because of the unrecognized-function error.
    steps:
      - uses: actions/checkout@v6
      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile at repo root — skipping container scan"
          fi
      - name: Build image
        if: steps.dockerfile_check.outputs.present == 'true'
        run: docker build -t concord:scan .
      - name: Trivy scan
        if: steps.dockerfile_check.outputs.present == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'concord:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy SARIF
        if: always() && steps.dockerfile_check.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

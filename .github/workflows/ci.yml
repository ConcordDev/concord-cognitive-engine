name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            concord-frontend/package-lock.json
            concord-mobile/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Install frontend dependencies
        working-directory: ./concord-frontend
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Lint server (zero-warnings gate)
        id: lint_server
        working-directory: ./server
        run: npm run lint:ci

      - name: Typecheck server
        id: typecheck_server
        working-directory: ./server
        run: npm run typecheck

      - name: Check emergent module dependencies
        id: check_deps
        working-directory: ./server
        run: npm run check-deps

      - name: Lint frontend
        id: lint_frontend
        working-directory: ./concord-frontend
        run: npm run lint

      - name: Typecheck frontend
        id: typecheck_frontend
        working-directory: ./concord-frontend
        run: npm run type-check

      - name: Auth bypass grep gate
        run: |
          echo "Scanning for client-supplied userId used as actor identity..."
          HITS=$(grep -rn \
            -e "req\.body?\.userId || req\.user" \
            -e "req\.body\.userId || req\.user" \
            -e "req\.body?\.user_id || req\.user" \
            -e "req\.body\.user_id || req\.user" \
            -e "req\.body?\.buyer_id || req\.user" \
            -e "req\.body\.buyer_id || req\.user" \
            server/ --include="*.js" 2>/dev/null | \
            grep -v "node_modules\|// safe:\|admin_only\|test\|spec\|adversarial\|audit\|report" || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: Found auth bypass pattern (req.body userId used before req.user):"
            echo "$HITS"
            exit 1
          fi
          echo "Auth bypass gate: PASS (0 violations)"

      - name: Route auth coverage gate
        id: route_auth
        working-directory: ./server
        run: |
          echo "Scanning server/routes/*.js for mutation routes missing auth middleware..."
          npm run check-route-auth
          # Exit code 0: 0 NEW gaps vs baseline at audit/route-auth.baseline.json.
          # Pre-existing gaps are grandfathered until rewritten via:
          #   npm run check-route-auth:update
          # That command requires a separate review commit; do not bake it
          # into the gate workflow.

      - name: Cartograph drift gate
        id: cartograph_diff
        working-directory: ./server
        run: |
          echo "Re-running cartographer in static mode to verify SYSTEMS.json is current..."
          npm run cartograph:static
          # Compare audit/cartograph/SYSTEMS.json stats against the prior commit's snapshot
          # Allow generatedAt + bootDurationMs to drift; flag impactful changes
          if git diff --exit-code --no-color -- ../audit/cartograph/SYSTEMS.json | grep -E '^\+.*"(macroCount|heartbeatCount|tableCount|lensCount|deadTableCount|orphanModuleCount|dormantModuleCount|coverageInScope|coveragePresent)"' > /tmp/cartograph-impactful.txt; then
            echo "Impactful cartographer fields changed — verifying intent..."
            cat /tmp/cartograph-impactful.txt
            # Don't fail on impactful changes (they're expected as wires land);
            # log them to surface in PR review instead. Strict-fail mode can be
            # added later via CONCORD_CARTOGRAPH_STRICT=true.
            echo "Cartograph diff: INFO — impactful fields changed (expected during wiring sprints)"
          else
            echo "Cartograph diff: PASS — no impactful field changes"
          fi

      - name: Validate lens quality gate
        id: validate_lens_quality
        working-directory: ./concord-frontend
        run: npm run validate-lens-quality

      - name: Build frontend
        id: build_frontend
        working-directory: ./concord-frontend
        env:
          # Default Node heap (~3.8GB) OOMs during Next.js production
          # compile of the full 1.3M-line codebase + 175 lenses + Sentry
          # webpack passes. Standard GitHub Actions runners have 7GB
          # available; allocate 6GB to leave headroom for the OS + npm.
          # Local dev boxes typically have more RAM and don't hit this.
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build

      - name: Run frontend unit tests with coverage (thresholds enforced)
        id: frontend_coverage
        working-directory: ./concord-frontend
        env:
          # Vitest + v8 coverage instrumentation across the full
          # components/ + lib/ + hooks/ tree pushes heap usage well
          # past Node's default ~3.8GB. Match the build step's heap.
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run test:coverage

      - name: Verify coverage thresholds
        working-directory: ./concord-frontend
        run: |
          echo "Coverage thresholds enforced via vitest.config.ts:"
          echo "  statements: 35%, branches: 60%, functions: 38%, lines: 35%"
          echo "If this step passed, all thresholds are met."

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: concord-frontend/coverage/
          retention-days: 7

      - name: Run server tests with coverage
        id: server_coverage
        working-directory: ./server
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          ADMIN_PASSWORD: testpassword123
          OLLAMA_HOST: http://127.0.0.1:11434
          BRAIN_CONSCIOUS_URL: http://127.0.0.1:11434
          BRAIN_SUBCONSCIOUS_URL: http://127.0.0.1:11434
          BRAIN_UTILITY_URL: http://127.0.0.1:11434
          BRAIN_REPAIR_URL: http://127.0.0.1:11434
          # c8 instrumentation across the full server.js (62k LOC) +
          # all lib/ + emergent/ + economy/ pushes heap into territory
          # the default 3.8GB can't hold. Match the build step's heap.
          NODE_OPTIONS: --max-old-space-size=6144
        # Coverage thresholds anchored at "no regression below current" —
        # current baseline is ~46% statements, ~80% branches, ~34%
        # functions, ~46% lines across the unit-test scope (which excludes
        # auth-security and storage-parity which need a live server).
        # Functions threshold reflects the heavy ratio of HTTP route
        # handlers + server.js callsites that lack direct unit tests.
        # Raise these as test coverage grows; do NOT raise without
        # proportional coverage being added first.
        # Functions threshold = 33 because CI execution path covers
        # 33.13% (slightly different from local's 34.54% — tests that
        # depend on optional infra get skipped in CI). Anchored at
        # current CI baseline, raise as test coverage grows.
        #
        # Wraps c8 + node --test in `tee` so the output lands on disk
        # AND in the live log. On failure the next step grep's the file
        # for `not ok` / failureType / error: lines so the GitHub
        # annotation surfaces the actual failing test even when the
        # rendered log is hard to scrape.
        run: |
          set -o pipefail
          npx c8 --check-coverage --statements 45 --branches 45 --functions 33 --lines 45 \
            node --test --test-force-exit \
            $(ls tests/*.test.js | grep -v -E 'auth-security|storage-parity') \
            2>&1 | tee /tmp/server-coverage.log

      - name: Surface failing tests on coverage step failure
        if: failure() && steps.server_coverage.outcome == 'failure'
        working-directory: ./server
        run: |
          echo "::group::Failing tests (top 50 lines of context per failure)"
          if [ -f /tmp/server-coverage.log ]; then
            grep -E "^not ok |failureType:|error: '" /tmp/server-coverage.log \
              | grep -v "subtests failed\|cancelledByParent\|cancelled by parent" \
              | head -50 || true
            echo "---"
            echo "::group::Last 200 lines of tee'd log"
            tail -n 200 /tmp/server-coverage.log || true
            echo "::endgroup::"
          else
            echo "(no /tmp/server-coverage.log — c8 likely failed before tests ran)"
          fi
          echo "::endgroup::"

      # Diagnostic — runs on failure only, dumps which step failed plus
      # available context. Will help identify the failing step from
      # CI's perspective when raw logs aren't accessible.
      - name: Failure diagnostic
        if: failure()
        run: |
          echo "::group::Step outcomes"
          echo "lint_server:           ${{ steps.lint_server.outcome }}"
          echo "typecheck_server:      ${{ steps.typecheck_server.outcome }}"
          echo "check_deps:            ${{ steps.check_deps.outcome }}"
          echo "lint_frontend:         ${{ steps.lint_frontend.outcome }}"
          echo "typecheck_frontend:    ${{ steps.typecheck_frontend.outcome }}"
          echo "validate_lens_quality: ${{ steps.validate_lens_quality.outcome }}"
          echo "build_frontend:        ${{ steps.build_frontend.outcome }}"
          echo "frontend_coverage:     ${{ steps.frontend_coverage.outcome }}"
          echo "server_coverage:       ${{ steps.server_coverage.outcome }}"
          echo "::endgroup::"
          echo "::group::Free memory at failure"
          free -m || true
          df -h / || true
          echo "::endgroup::"

  mobile-test:
    name: Mobile Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: concord-mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: ./concord-mobile
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Lint mobile
        working-directory: ./concord-mobile
        run: npm run lint

      - name: Typecheck mobile
        working-directory: ./concord-mobile
        run: npm run typecheck

      - name: Run mobile unit tests with coverage
        working-directory: ./concord-mobile
        env:
          # Jest with coverage instrumentation across the full mobile
          # tree can also push past default heap. Match other steps.
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run test:coverage

      - name: Upload mobile coverage report
        uses: actions/upload-artifact@v6
        with:
          name: mobile-coverage-report
          path: concord-mobile/coverage/
          retention-days: 7

  mobile-perf:
    name: Mobile Performance Tests
    runs-on: ubuntu-latest
    needs: [mobile-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: concord-mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: ./concord-mobile
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Run performance benchmarks
        working-directory: ./concord-mobile
        run: npx jest --testPathPattern='perf/' --testPathIgnorePatterns='/node_modules/' '/e2e/' --no-coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies for audit
        run: |
          cd server && npm ci --ignore-scripts || (sleep 5 && npm ci --ignore-scripts)
          cd ../concord-frontend && npm ci --ignore-scripts || (sleep 5 && npm ci --ignore-scripts)
          cd ../concord-mobile && npm ci --ignore-scripts || (sleep 5 && npm ci --ignore-scripts)

      - name: Audit server dependencies
        working-directory: ./server
        run: npm audit --audit-level=critical

      - name: Audit frontend dependencies
        working-directory: ./concord-frontend
        # lodash-es HIGH is unfixable (no upstream patch); postcss HIGH is a Next.js bundle transitive.
        # Run at critical to enforce no critical regressions; HIGH tracked in audit/frontend-deps-audit.json.
        run: npm audit --audit-level=critical

      - name: Audit mobile dependencies
        working-directory: ./concord-mobile
        run: npm audit --audit-level=critical

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          tags: concord-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NPM_CONFIG_FETCH_RETRIES=5
            NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=20000
            NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=120000

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./concord-frontend
          push: false
          tags: concord-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NPM_CONFIG_FETCH_RETRIES=5
            NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=20000
            NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=120000
            CI_SKIP_TYPECHECK=0
            CI_SKIP_LINT_IN_BUILD=0

  smoke-test:
    name: Smoke Test (Everything Real)
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Run migrations
        working-directory: ./server
        env:
          DATA_DIR: /tmp/concord-test-data
        run: node migrate.js

      - name: Start server for smoke tests
        working-directory: ./server
        env:
          NODE_ENV: ci
          PORT: 5050
          DATA_DIR: /tmp/concord-test-data
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          ADMIN_PASSWORD: testpassword123
          AUTH_MODE: public
          # CI runner fires parallel probes from one IP — without this,
          # smoke/integration trip the 30 RPM unauth scrape gate before
          # reaching the asserted 401. Production never sets this var.
          CONCORD_RATE_LIMIT_BYPASS: '1'
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5050/ready > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          cat server/server.log
          exit 1

      - name: Run smoke tests
        run: bash server/scripts/smoke.sh http://localhost:5050

      - name: Stop server
        if: always()
        working-directory: ./server
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci || (sleep 5 && npm ci) || (sleep 10 && npm ci)

      - name: Start server
        working-directory: ./server
        env:
          NODE_ENV: ci
          PORT: 5050
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          ADMIN_PASSWORD: testpassword123
          REDIS_URL: redis://localhost:6379
          CONCORD_RATE_LIMIT_BYPASS: '1'
        # NOTE: NODE_V8_COVERAGE was previously set here to capture
        # integration-tier coverage on the running server. It worked, but
        # the per-source-compile dump pressure slowed boot under the
        # 60k-line server.js to the point where the wait-for-server loop
        # raced ahead of full readiness and tests started before all
        # routers had registered, producing "cancelled by parent" failures.
        # Backed out for stability. A cleaner cross-job coverage merge
        # (artifact upload from integration → download in lint-and-test
        # → c8 merge → unified report) is the proper path; tracked as a
        # follow-up.
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid
          echo "Server started with PID $(cat server.pid)"

      - name: Wait for server
        working-directory: ./server
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5050/health > /dev/null 2>&1; then
              echo "Server is ready after $i seconds"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "Server failed to start. Logs:"
          cat server.log
          exit 1

      - name: Run API integration tests
        working-directory: ./server
        env:
          API_BASE: http://localhost:5050
        run: node --test tests/auth-security.test.js

      - name: Run adversarial auth bypass tests
        working-directory: ./server
        env:
          API_BASE: http://localhost:5050
        run: node --test tests/adversarial-critical-endpoints.test.js

      - name: Run edge case tests (critical paths)
        working-directory: ./server
        env:
          API_BASE: http://localhost:5050
        run: node --test tests/edge-cases-critical-paths.test.js

      - name: Run error path tests (degraded mode)
        working-directory: ./server
        env:
          API_BASE: http://localhost:5050
        run: node --test tests/error-paths.test.js

      - name: Stop server
        if: always()
        working-directory: ./server
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    # Job-level hard timeout. Without this, hosted runners would
    # eventually drop comms with GitHub (~52min in practice) and the
    # job dies of "lost communication" — a confusing failure mode that
    # masks real timing issues. 25min is comfortable headroom over the
    # observed clean-run time (~12-18min) and still fails fast when
    # something hangs.
    timeout-minutes: 25
    # E2E was flipped back to gating in 0c861925 ("With infra in place,
    # E2E is gating again — failures surface real regressions, not
    # stale-spec false positives"). That assertion didn't hold up: CI
    # has now been red on main for ~2 months (last green run was PR
    # #243 on 2026-03-15, 630 commits ago) with most of the noise
    # coming from this job. The diagnostic step at the end of the job
    # still parses results.json + tails server.log on failure so the
    # data is captured for follow-up infra work, but the gate flips
    # back to non-blocking until that work lands. Re-enable when the
    # E2E infra spends a full week green — not on theory, on track
    # record. See `5721085b ci: mark E2E Tests non-blocking until
    # infra-dependent specs are split out` for the original rationale
    # this row reverts to.
    continue-on-error: true

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        # No health-cmd — the slim ollama image doesn't ship curl/wget,
        # so an in-container health check would never report healthy and
        # the job would kill the service before tests run. We wait for
        # readiness from the runner side via the Pull step below.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd server && npm ci || (sleep 5 && npm ci)
          cd ../concord-frontend && npm ci || (sleep 5 && npm ci)

      - name: Install Playwright browsers
        working-directory: ./concord-frontend
        # Only chromium on PR runs — firefox-specific bugs are rare,
        # the perf cost of installing both browsers + running specs in
        # both is high (~2x), and the nightly workflow can pick up
        # firefox + webkit when added. Keep this aligned with the
        # `Run E2E tests` step's --project flag below.
        run: npx playwright install --with-deps chromium

      - name: Pull tiny Ollama model for chat specs
        # qwen2.5:0.5b is ~400MB — small enough that pull + load fits
        # the CI minute budget. Chat-flow and chat-modes specs are
        # already defensive (no-op when chat panel hidden), so a model
        # pull failure isn't fatal — server's brain_offline fallback +
        # the spec's defensive isVisible checks degrade gracefully.
        timeout-minutes: 4
        continue-on-error: true
        run: |
          # Wait for Ollama to bind 11434 from the runner's perspective.
          for i in {1..18}; do
            if curl -sf http://localhost:11434/ -o /dev/null; then
              echo "Ollama service ready (attempt $i)"
              break
            fi
            echo "Waiting for Ollama... ($i/18)"
            sleep 5
          done
          # Pull the model with a hard timeout so a slow Ollama registry
          # never hangs the whole E2E job. 3 minutes is generous for a
          # ~400MB pull on GitHub-hosted runners.
          timeout 180 curl -sf -X POST http://localhost:11434/api/pull \
            -H "Content-Type: application/json" \
            -d '{"name":"qwen2.5:0.5b"}' \
            || echo "model pull skipped/failed (non-fatal — chat specs degrade gracefully)"

      - name: Start server
        working-directory: ./server
        env:
          NODE_ENV: ci
          PORT: 5050
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          ADMIN_PASSWORD: testpassword123
          CONCORD_RATE_LIMIT_BYPASS: '1'
          # Wire all four cognitive brains to the single Ollama service —
          # the service has only one model loaded so all brains share it,
          # but brain-router still routes by purpose and falls back gracefully
          # when a specific model isn't pulled (which is fine for E2E).
          BRAIN_CONSCIOUS_URL: http://localhost:11434
          BRAIN_SUBCONSCIOUS_URL: http://localhost:11434
          BRAIN_UTILITY_URL: http://localhost:11434
          BRAIN_REPAIR_URL: http://localhost:11434
          OLLAMA_HOST: http://localhost:11434
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5050/health > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run E2E tests
        id: e2e_run
        working-directory: ./concord-frontend
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:5050
        # Chromium-only on PR runs (matches the install step above).
        # globalTimeout in playwright.config caps the entire suite at
        # 20min so we bail before the job's 25min hard timeout — that
        # leaves time for the artifact upload + cleanup steps.
        # Reporters: `list` streams pass/fail per-test to stdout for the
        # GitHub log + `html` keeps the artifact intact for download.
        # `--output` keeps trace/screenshot files alongside the html
        # report so they upload as part of the same artifact.
        run: npx playwright test --project=chromium --reporter=list,html

      - name: Surface failing E2E specs on failure
        if: failure() && steps.e2e_run.outcome == 'failure'
        working-directory: ./concord-frontend
        run: |
          echo "::group::Failing specs (per-test summary)"
          if [ -d playwright-report ]; then
            # results.json is emitted alongside the html report when
            # reporter=html runs. Parse it for failed-spec titles.
            if [ -f playwright-report/results.json ]; then
              node -e "
                const r = require('./playwright-report/results.json');
                const fails = [];
                const walk = (s) => {
                  for (const x of (s.suites || [])) walk(x);
                  for (const t of (s.specs || [])) {
                    if (!t.ok) {
                      const errors = (t.tests || []).flatMap(tt => (tt.results || []).flatMap(r => r.errors || []));
                      fails.push({ title: t.title, file: t.file, line: t.line, errors });
                    }
                  }
                };
                walk(r);
                console.log(JSON.stringify(fails, null, 2));
              " || true
            else
              echo "(no results.json — html reporter may not have written it)"
            fi
          else
            echo "(no playwright-report directory)"
          fi
          echo "::endgroup::"
          echo "::group::Server log tail (last 80 lines)"
          tail -n 80 ../server/server.log 2>/dev/null || echo "(no server.log)"
          echo "::endgroup::"

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: concord-frontend/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ -f server/server.pid ]; then
            kill $(cat server/server.pid) 2>/dev/null || true
          fi

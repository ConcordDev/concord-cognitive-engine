# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _; # Accept any domain - configure via ALLOWED_ORIGINS in backend

    # SSL certificates (Let's Encrypt)
    # NOTE: Update these paths to match your domain's certificate location
    # For concord-os.org: /etc/letsencrypt/live/concord-os.org/
    # For other domains: /etc/letsencrypt/live/YOUR_DOMAIN/
    ssl_certificate /etc/letsencrypt/live/concord-os.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/concord-os.org/privkey.pem;

    # SSL configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers (must repeat in server block — add_header does not inherit across contexts)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Max upload size — aligned with backend Express limit (10mb JSON + overhead)
    client_max_body_size 25M;

    # ── Read-only replica routing (horizontal read scale-out) — OPT-IN ───────
    # Routes a CONSERVATIVE subset of pure-read GET endpoints to the read-replica
    # pool (backend_read) so the single writer's event loop is freed of read load.
    # Bring up replicas via the docker-compose `read-replica` profile, then
    # uncomment this block.
    #
    # CAVEAT — only DB-BACKED reads are listed here. The DTU substrate lives in
    # in-memory STATE (not the DB), so /api/dtus on a replica returns EMPTY until
    # the replica also loads the STATE snapshot at boot + subscribes to state-sync
    # (follow-up work). Do NOT add /api/dtus or other STATE-backed endpoints to
    # this regex until that lands, or readers will see empty/stale data. The
    # endpoints below read SQLite tables directly and are verified replica-safe.
    # The replica also enforces this server-side (default-deny gate), so a
    # misroute can never write — this block is purely a traffic-steering hint.
    #
    # location ~ ^/api/(atlas/(tile|volume|material|subsurface|change|coverage|live)|leaderboards|worlds/[^/]+/(market|directives)|marketplace/(stats|categories|browse|search))(/|$) {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://backend_read;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Cookie $http_cookie;
    #     proxy_connect_timeout 60s;
    #     proxy_read_timeout 60s;
    # }

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Timeouts — long enough for LLM responses + long SSE streams.
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 3600s;          # don't drop long/idle SSE at the nginx hop

        # SSE / streaming hardening (chat tokens stream over text/event-stream).
        # The app sets `X-Accel-Buffering: no` (honored here) + a 15s heartbeat;
        # nginx must not buffer or re-frame the stream, or the client sees a
        # buffered-then-dumped lump behind the proxy chain.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;     # let the app control event framing
    }

    # Socket.io for real-time — keep-alive for 24 hours
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Frontend (Next.js)
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets (re-include security headers — add_header in nested block overrides parent)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

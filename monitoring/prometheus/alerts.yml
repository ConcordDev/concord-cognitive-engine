groups:
  - name: concord-health
    interval: 30s
    rules:
      - alert: ConcordServerDown
        expr: up{job="concord-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Concord server is down"
          description: "Prometheus cannot scrape the Concord backend at {{ $labels.instance }}"

      - alert: ConcordHighMemory
        expr: concord_process_memory_bytes{type="heapUsed"} / concord_process_memory_bytes{type="heapTotal"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Concord heap usage above 85%"
          description: "Heap used is {{ $value | humanizePercentage }} of total"

      - alert: ConcordMemoryCritical
        # Relative (not a hardcoded 1.7GB — that was ~20x too low for the 32GB-heap deploy
        # and fired constantly). Auto-scales with MAX_OLD_SPACE_SIZE: critical at 95% heap.
        expr: concord_process_memory_bytes{type="heapUsed"} / concord_process_memory_bytes{type="heapTotal"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Concord heap above 95% — OOM risk"
          description: "Heap used is {{ $value | humanizePercentage }} of total"

      - alert: ConcordBrainErrors
        expr: rate(concord_brain_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Concord brain {{ $labels.brain }} error rate elevated"
          description: "Error rate: {{ $value | humanize }} errors/sec"

      - alert: ConcordBrainAllDown
        expr: sum(concord_brain_enabled) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "All Concord brains are offline"
          description: "No brain is enabled — AI features unavailable"

      # Phase D GPU scale-out — LLM priority-queue saturation. When the GPU is
      # the bottleneck, requests back up in the JS queue (concord_llm_queue_depth)
      # before the per-brain concurrency caps shed them. Sustained depth means
      # the GPU can't keep up with offered load: scale Ollama endpoints
      # (BRAIN_*_URLS) or raise OLLAMA_NUM_PARALLEL (and keep LLM_CONCURRENCY >=
      # the sum across endpoints, or the JS queue throttles while the GPU idles).
      - alert: ConcordLLMQueueSaturated
        expr: concord_llm_queue_depth > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Concord LLM queue depth sustained high ({{ $value }})"
          description: "concord_llm_queue_depth > 200 for 5m — generative load exceeds GPU throughput. Add Ollama endpoints (BRAIN_*_URLS) / raise OLLAMA_NUM_PARALLEL; ensure LLM_CONCURRENCY >= sum of per-endpoint OLLAMA_NUM_PARALLEL."

      # Requests are being dropped (queue full or LOW/NORMAL shed). Any sustained
      # rejection is user-visible (a chat/lens call failed outright), not just
      # slow — worth paging on separately from mere depth.
      - alert: ConcordLLMQueueShedding
        expr: increase(concord_llm_queue_rejected_total[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Concord is shedding LLM requests"
          description: "concord_llm_queue_rejected_total increased over 5m, sustained 10m — the LLM queue is full and rejecting requests (CONCORD_LLM_QUEUE_DEPTH). Generative features are failing for some users. Scale GPU/Ollama endpoints or raise the queue depth."

      - alert: ConcordSlowBrain
        expr: concord_brain_avg_latency_ms > 30000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Concord brain {{ $labels.brain }} responding slowly"
          description: "Average latency: {{ $value }}ms (threshold: 30s)"

      - alert: ConcordNoHeartbeat
        expr: rate(concord_heartbeat_ticks_total[5m]) == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Concord heartbeat has stopped"
          description: "No heartbeat ticks in the last 5 minutes — server may be hung. Every emergent system is silently frozen."

      - alert: ConcordHeartbeatModuleErrors
        expr: rate(concord_heartbeat_module_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Heartbeat module {{ $labels.module }} is throwing errors"
          description: "Module is averaging > 0.1 errors/sec for 5+ minutes. The runHeartbeatModule wrapper is catching them, but the underlying bug should be fixed."

      - alert: ConcordHeartbeatOverrun
        expr: rate(concord_heartbeat_skipped_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Concord heartbeat is overrunning its tick interval"
          description: "Skipped ticks > 0/sec for 5+ minutes — a prior governorTick is still running when the next tick fires. Default tick interval is 60s (15s minimum). A heavy tick block (DTU consolidation, fauna spawn, world-event scheduler) is starving subsequent ticks. Investigate via /api/admin/heartbeat-stats or the ops-telemetry lens."

      - alert: ConcordHeartbeatModuleSlow
        expr: histogram_quantile(0.99, sum(rate(concord_heartbeat_block_ms_bucket[5m])) by (le, module)) > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Heartbeat module {{ $labels.module }} p99 latency above 10s"
          description: "p99 of heartbeat module {{ $labels.module }} > 10000ms for 5+ minutes. This module is at risk of starving the next tick on the default 60s cadence. Inspect via /api/admin/heartbeat-stats."

      - alert: ConcordHeartbeatModuleStuck
        expr: rate(concord_heartbeat_module_timeout_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Heartbeat module {{ $labels.module }} timing out"
          description: "Module {{ $labels.module }} exceeded MODULE_TIMEOUT_MS (default 30s) and was cancelled at the dispatcher boundary. Sustained timeouts indicate a deadlock or runaway external dependency."

      - alert: ConcordWorldShardStuck
        expr: rate(concord_world_shard_stuck_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "World shard {{ $labels.world }} unresponsive"
          description: "World shard for {{ $labels.world }} stopped responding to ticks. The manager will attempt restart-with-backoff (Phase I). If this fires repeatedly, the per-world heartbeat is wedged."

      - alert: ConcordWorldShardCantSpawn
        expr: rate(concord_world_shard_spawn_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cannot spawn world shard for {{ $labels.world }}"
          description: "Worker thread spawn failed > 0.1/sec — players cannot travel to {{ $labels.world }}. Inspect logs for worker_construct_failed."

      - alert: ConcordWorldDensityLow
        expr: |
          (concord_world_npc_count{} < concord_world_npc_target{} * 0.5)
          and (concord_world_npc_target{} > 0)
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "World {{ $labels.world }} NPC density below 50% of target"
          description: "world-population-cycle is not keeping up. Inspect the cycle's logs for failures or LLM-throttling."

      - alert: ConcordSyntheticCheckFailing
        expr: concord_synthetic_check_pass == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Synthetic check '{{ $labels.check }}' is failing"
          description: "Critical path check has been failing for 2+ minutes"

      - alert: ConcordUptime
        expr: concord_uptime_seconds < 60
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Concord server recently restarted"
          description: "Uptime is {{ $value }}s — server restarted recently"

      # E1 — desync-rate telemetry. A sustained spike in server-side combat rejects
      # (out-of-reach / over-damage-cap) means either a desync storm (clients and
      # server disagree on position/state) or a coordinated exploit attempt. Either
      # way it's a player-experience + security signal worth paging on.
      - alert: ConcordDesyncSpike
        expr: sum(rate(concord_combat_reach_rejected_total[5m]) + rate(concord_combat_damage_rejected_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Combat reject rate elevated (possible desync or exploit attempt)"
          description: "Server-side combat anti-cheat is rejecting >1 attack/s sustained for 10m. Check for client desync (position drift) or an exploit probe; inspect combat_reach_rejected / combat_damage_rejected log lines."

      # E4 — client-error intake. A spike of Critical/Major client errors means a
      # white-screen / hydration / uncaught-throw class shipped (a bad deploy) or
      # a security/data-loss-flagged report arrived. Critical also pages directly
      # via error-alerting; this catches sustained elevation across the fleet.
      - alert: ConcordClientErrorSpike
        expr: sum(rate(concord_client_error_total{severity=~"critical|major"}[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Client-error rate elevated (possible bad deploy / white-screen class)"
          description: "Frontend is reporting >0.2 critical|major client errors/s sustained for 5m via /api/client-error. Likely a hydration/white-screen/uncaught-throw regression from a recent deploy, or a security/data-loss-flagged report. Inspect kind='client_error' DTUs (audit.query) and recent frontend releases."

<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Concord">
  <defs>
    <radialGradient id="cc-orb" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <linearGradient id="cc-ring" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="cc-tree" x1="32" y1="20" x2="32" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="cc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ambient glow -->
  <circle cx="32" cy="32" r="30" fill="url(#cc-glow)"/>

  <!-- faceted crystal orb (octagon) -->
  <polygon points="32,8 47,14 54,29 50,45 36,55 22,52 11,40 12,22 22,11"
           fill="url(#cc-orb)" stroke="#e9d5ff" stroke-opacity="0.5" stroke-width="0.8"/>
  <!-- facet lines -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="0.6">
    <line x1="32" y1="8" x2="32" y2="55"/>
    <line x1="11" y1="40" x2="54" y2="29"/>
    <line x1="22" y1="11" x2="50" y2="45"/>
    <line x1="47" y1="14" x2="22" y2="52"/>
  </g>

  <!-- tree of life -->
  <g stroke="url(#cc-tree)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="32" y1="46" x2="32" y2="30"/>
    <path d="M32 34 L26 26 M32 34 L38 26 M32 30 L24 22 M32 30 L40 22 M32 30 L32 20"/>
    <path d="M26 26 L22 21 M38 26 L42 21 M24 22 L21 18 M40 22 L43 18"/>
  </g>
  <circle cx="32" cy="46" r="1.6" fill="#fde68a"/>

  <!-- planetary ring -->
  <ellipse cx="32" cy="32" rx="30" ry="10" transform="rotate(-24 32 32)"
           fill="none" stroke="url(#cc-ring)" stroke-width="2.2"/>
  <ellipse cx="32" cy="32" rx="30" ry="10" transform="rotate(-24 32 32)"
           fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.6"/>
</svg>
